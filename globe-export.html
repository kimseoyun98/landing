<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Globe Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff; color: #1a1a1a;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 32px 0 60px;
    }
    h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; color: #1a1a1a; margin-bottom: 24px; }
    .tabs {
      display: flex; gap: 6px; background: #fff;
      border: 1px solid #e8e8e8; border-radius: 12px;
      padding: 4px; margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .tab {
      padding: 8px 18px; border: none; background: none;
      border-radius: 8px; font-family: inherit; font-size: 13px;
      font-weight: 500; color: #888; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .tab:hover { background: #f5f5f5; color: #333; }
    .tab.active { background: #1a1a1a; color: #fff; }
    .globe-wrap {
      width: 500px; height: 500px;
      position: relative; flex-shrink: 0;
      transition: border-radius .3s, box-shadow .3s;
    }
    /* Globe 1, 3: 원형 클립 */
    .globe-wrap.circle-clip {
      border-radius: 50%; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.12);
    }
    /* Globe 2, 4: 물체만 (그림자 없음) */
    .globe-wrap.free-form {
      border-radius: 0; overflow: visible;
      box-shadow: none;
    }
    #globe-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .panel {
      margin-top: 20px; background: #fff; border: 1px solid #e8e8e8;
      border-radius: 16px; padding: 18px 24px; width: 540px;
      box-shadow: 0 1px 6px rgba(0,0,0,.05); display: flex; flex-direction: column; gap: 14px;
    }
    .panel-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; color: #bbb; text-transform: uppercase; }
    .row { display: flex; gap: 10px; align-items: center; }
    .row label { font-size: 13px; color: #666; min-width: 60px; }
    .val { font-size: 12px; color: #aaa; min-width: 34px; text-align: right; }
    input[type=range] { flex: 1; height: 4px; accent-color: #1a1a1a; }
    input[type=color] { width: 32px; height: 26px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; padding: 0; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
    #status-text { font-size: 12px; color: #888; }
    .desc-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: #888; background: #f5f5f5;
      border-radius: 20px; padding: 4px 10px;
    }
    /* ── 전체보기 버튼 ────────────────────────────────── */
    .globe-outer { position: relative; display: inline-block; }
    .fs-btn {
      position: absolute; top: 10px; right: 10px;
      background: rgba(255,255,255,0.92); border: 1px solid #ddd;
      border-radius: 8px; padding: 5px 10px; font-size: 12px;
      cursor: pointer; z-index: 20; color: #444;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
      transition: background .15s, color .15s;
    }
    .fs-btn:hover { background: #fff; color: #111; }
    /* ── 풀스크린 오버레이 ──────────────────────────── */
    #fs-overlay {
      display: none; position: fixed; inset: 0;
      background: #fff; z-index: 9999;
      align-items: center; justify-content: center;
    }
    #fs-overlay.active { display: flex; }
    #fs-canvas { display: block; }
    .fs-close {
      position: fixed; top: 20px; right: 24px;
      background: rgba(0,0,0,0.06); border: none;
      border-radius: 8px; padding: 8px 12px; font-size: 18px;
      cursor: pointer; z-index: 10000; color: #444;
      transition: background .15s;
    }
    .fs-close:hover { background: rgba(0,0,0,0.12); }
  </style>
</head>
<body>

<h1>Globe Viewer</h1>

<div class="tabs">
  <button class="tab active" data-g="1">Globe 1 · 화폐 문자</button>
  <button class="tab"        data-g="2">Globe 2 · 구면 투영</button>
  <button class="tab"        data-g="3">Globe 3 · 코인</button>
  <button class="tab"        data-g="4">Globe 4 · Neo</button>
</div>

<div class="globe-outer">
  <div class="globe-wrap circle-clip" id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
  </div>
  <button class="fs-btn" id="fs-btn">⛶ 전체보기</button>
</div>

<!-- 풀스크린 오버레이 -->
<div id="fs-overlay">
  <button class="fs-close" id="fs-close">✕</button>
  <canvas id="fs-canvas"></canvas>
</div>

<div class="panel">
  <div class="panel-title">색상</div>

  <div id="ctrl-g1" style="display:block">
    <div class="row" style="margin-bottom:10px">
      <span class="desc-chip" id="globe-desc">화폐 글리프 · 평면 투영 · 25초/회전</span>
    </div>
    <div class="row">
      <div style="width:10px;height:10px;border-radius:50%;background:#FF7300;flex-shrink:0"></div>
      <label>육지 색</label>
      <input type="color" id="color-land" value="#FF7300" />
      <input type="range" id="alpha-land" min="0" max="100" value="90" />
      <span class="val" id="al-val">90%</span>
    </div>
    <div class="row">
      <div style="width:10px;height:10px;border-radius:50%;background:#8B95A1;flex-shrink:0"></div>
      <label>바다 색</label>
      <input type="color" id="color-sea" value="#8B95A1" />
      <input type="range" id="alpha-sea" min="0" max="100" value="60" />
      <span class="val" id="as-val">60%</span>
    </div>
    <div class="row">
      <label>배경</label>
      <select id="bg-sel" style="background:#f5f5f5;color:#1a1a1a;border:1px solid #ddd;padding:5px 10px;border-radius:8px;font-size:13px">
        <option value="#ffffff" selected>흰색</option>
        <option value="#f5f0eb">크림</option>
        <option value="#0d0d0d">검정</option>
        <option value="#1c1a17">다크브라운</option>
      </select>
    </div>
  </div>

  <div id="ctrl-g2" style="display:none">
    <div class="row" style="margin-bottom:10px">
      <span class="desc-chip">화폐 글리프 · 구면 투영(18° 틸르트) · 12초/회전</span>
    </div>
    <div class="row">
      <div style="width:10px;height:10px;border-radius:50%;background:#FF7300;flex-shrink:0"></div>
      <label>육지 색</label>
      <input type="color" id="g2-land" value="#FF7300" />
      <input type="range" id="g2-alpha-land" min="0" max="100" value="90" />
      <span class="val" id="g2-al-val">90%</span>
    </div>
    <div class="row">
      <div style="width:10px;height:10px;border-radius:50%;background:#8B95A1;flex-shrink:0"></div>
      <label>바다 색</label>
      <input type="color" id="g2-sea" value="#8B95A1" />
      <input type="range" id="g2-alpha-sea" min="0" max="100" value="60" />
      <span class="val" id="g2-as-val">60%</span>
    </div>
    <div class="row">
      <label>바깥 배경</label>
      <input type="color" id="g2-bg" value="#f4f4f4" />
    </div>
    <div class="row">
      <label>아크 색</label>
      <input type="color" id="g2-arc" value="#FF7300" />
    </div>
  </div>

  <div id="ctrl-g3" style="display:none">
    <div class="row" style="margin-bottom:10px">
      <span class="desc-chip">코인 그리드 · 헥스 배치 · 20초/회전</span>
    </div>
    <div class="row">
      <label>배경색</label>
      <input type="color" id="coin-bg" value="#FF7300" />
    </div>
    <div class="row">
      <label>코인색</label>
      <input type="color" id="coin-fg" value="#FFFFFF" />
    </div>
  </div>

  <div id="ctrl-g4" style="display:none">
    <div class="row" style="margin-bottom:10px">
      <span class="desc-chip">도트 매트릭스 · 도시 아크 · Stripe 스타일</span>
    </div>
    <div class="row">
      <label>점 색</label>
      <input type="color" id="neo-dot" value="#888888" />
    </div>
    <div class="row">
      <label>아크 색</label>
      <input type="color" id="neo-arc" value="#FF7300" />
    </div>
    <div class="row">
      <label>배경</label>
      <input type="color" id="neo-bg" value="#ffffff" />
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">속도</div>
  <div class="row">
    <label>회전 속도</label>
    <input type="range" id="speed" min="1" max="10" value="5" />
    <span class="val" id="sp-val">5×</span>
  </div>
</div>

<div class="panel" style="flex-direction:row;align-items:center;gap:10px;padding:14px 24px">
  <div class="status-dot"></div>
  <span id="status-text">로딩 중...</span>
</div>

<script>
'use strict';

// ── Shared ──────────────────────────────────────────────────────────────
const EARTH_URL = 'http://localhost:5176/earth-mask.jpg';
const CHARS     = ['$','\u20ac','\u00a3','\u00a5','\u20a9','\u20b9'];
const CHINA_EU  = 0.5 + 104 / 360;
let SIZE = 500;
const DPR       = window.devicePixelRatio || 1;

function easeOutBack(t) {
  const c1=1.70158, c3=c1+1;
  return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
}

let earthData=null, earthW=0, earthH=0, earthReady=false;
const earthCallbacks=[];

function loadEarth(cb) {
  if (earthReady) { cb(); return; }
  earthCallbacks.push(cb);
  if (earthCallbacks.length > 1) return;
  const img = new Image(); img.crossOrigin='anonymous'; img.src=EARTH_URL;
  img.onload = () => {
    const off=document.createElement('canvas');
    off.width=img.naturalWidth; off.height=img.naturalHeight;
    const oc=off.getContext('2d'); oc.drawImage(img,0,0);
    const d=oc.getImageData(0,0,img.naturalWidth,img.naturalHeight);
    earthData=d.data; earthW=img.naturalWidth; earthH=img.naturalHeight;
    earthReady=true; setStatus('준비 완료 ✓');
    earthCallbacks.forEach(f=>f());
  };
  img.onerror = () => setStatus('⚠️ earth-mask 로드 실패');
}
function setStatus(m) { document.getElementById('status-text').textContent=m; }

const canvas=document.getElementById('globe-canvas');
canvas.width=Math.round(SIZE*DPR); canvas.height=Math.round(SIZE*DPR);
canvas.style.width=SIZE+'px'; canvas.style.height=SIZE+'px';
const ctx=canvas.getContext('2d');
ctx.setTransform(DPR,0,0,DPR,0,0);
let CX=SIZE/2, CY=SIZE/2;

// 풀스크린 캔버스
const fsCanvas=document.getElementById('fs-canvas');
const fsCtx=fsCanvas.getContext('2d');
let fsActive=false;

// ── Globe 1: flat equirectangular ───────────────────────────────────────
class Globe1 {
  constructor() {
    this.scrollU=0; this.glyphs=[];
    this._build();
  }
  _build() {
    if (!earthReady) return; this.glyphs=[];
    for (let r=0;r<65;r++) for (let c=0;c<130;c++) {
      const eu=c/130, ev=r/65;
      const px=Math.min(Math.floor(eu*earthW),earthW-1);
      const py=Math.min(Math.floor(ev*earthH),earthH-1);
      this.glyphs.push({eu,ev,isLand:(earthData[(py*earthW+px)*4]??0)<128,
        char:CHARS[Math.floor(Math.random()*6)],variation:Math.random(),
        timer:Math.random()*3,interval:0.7+Math.random()*2.8,flash:0});
    }
  }
  draw(dt,sp,cL,cS,aL,aS,bg) {
    this.scrollU=(this.scrollU+(1/25)*sp*dt)%1;
    const cr=Math.hypot(CX,CY), scale=(cr*2)/earthH, earthPx=earthW*scale;
    const circleR=Math.max(4,(earthH*scale/120)*0.44);
    const fs=Math.max(8,Math.round(circleR*0.7));
    ctx.fillStyle=bg; ctx.fillRect(0,0,SIZE,SIZE);
    if (!this.glyphs.length) return;
    ctx.font=`100 ${fs}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=0.6;
    for (const g of this.glyphs) {
      g.timer+=dt;
      if (g.timer>=g.interval) { g.timer=0;g.interval=0.7+Math.random()*2.8;g.char=CHARS[Math.floor(Math.random()*6)];g.flash=1; }
      if (g.flash>0) g.flash=Math.max(0,g.flash-dt*5);
      const rawU=(g.eu-CHINA_EU+0.5-this.scrollU+100)%1;
      const sy=CY+(g.ev-0.5)*earthH*scale;
      for (const uOff of [0,-1,1]) {
        const sx=CX+(rawU+uOff-0.5)*earthPx, dx=sx-CX, dy=sy-CY;
        if (dx*dx+dy*dy>cr*cr) continue;
        const mul=g.isLand?aL:aS;
        const base=g.isLand?(0.58+g.variation*0.32)*mul:(0.18+g.variation*0.18)*mul;
        const alpha=Math.min(1,base+g.flash*0.35);
        if (alpha<=0.001) continue;
        const color=g.isLand?cL:cS;
        ctx.globalAlpha=alpha; ctx.strokeStyle=color;
        ctx.beginPath(); ctx.arc(sx,sy,circleR,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle=color; ctx.fillText(g.char,sx,sy);
      }
    }
    ctx.globalAlpha=1;
  }
}

// ── Globe 2: orthographic sphere ────────────────────────────────────────
const TILT2=18*Math.PI/180, cosT2=Math.cos(TILT2), sinT2=Math.sin(TILT2);
class Globe2 {
  constructor() { this.scrollU=0;this.glyphs=[];this.arcs=[];this.arcTimer=0;this._build(); }
  _build() {
    if (!earthReady) return; this.glyphs=[];
    for (let r=0;r<65;r++) for (let c=0;c<130;c++) {
      const eu=c/130, ev=r/65;
      const px=Math.min(Math.floor(eu*earthW),earthW-1);
      const py=Math.min(Math.floor(ev*earthH),earthH-1);
      this.glyphs.push({eu,ev,isLand:(earthData[(py*earthW+px)*4]??0)<128,
        char:CHARS[Math.floor(Math.random()*6)],variation:Math.random()});
    }
  }
  _proj(lat,lon) {
    // 위도/경도 → Globe2 회전 투영 좌표
    const eu=lon/(Math.PI*2)+0.5;
    const rawU=(eu-CHINA_EU+0.5-this.scrollU+100)%1;
    const delta=(rawU-0.5)*Math.PI*2;
    const cosLat=Math.cos(lat);
    const x3=cosLat*Math.sin(delta), y3=Math.sin(lat), z3=cosLat*Math.cos(delta);
    const y2=y3*cosT2-z3*sinT2, z2=y3*sinT2+z3*cosT2;
    const R=CX*0.88;
    return {sx:CX+R*x3, sy:CY-R*y2, z:z2};
  }
  _spawnArc() {
    const a=Math.floor(Math.random()*NEO_CITIES.length);
    let b; do{b=Math.floor(Math.random()*NEO_CITIES.length);}while(b===a);
    this.arcs.push({from:NEO_CITIES[a],to:NEO_CITIES[b],t:0,dur:1.6+Math.random()*1.2,alpha:0});
  }
  draw(dt,sp,cL,cS,aL,aS,bg,ac) {
    this.scrollU=(this.scrollU+(1/12)*sp*dt)%1;
    const R=CX*0.88, scale=(R*2)/earthH;
    const circleR=Math.max(4,(earthH*scale/65)*0.49), fs=Math.max(9,Math.round(circleR*1.1));
    // 배경
    ctx.fillStyle=bg; ctx.fillRect(0,0,SIZE,SIZE);
    ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fill();
    if (!this.glyphs.length) return;
    // 글리프 그리기 (플래시/바운스 없음)
    ctx.font=`600 ${fs}px 'Inter',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=1.2;
    for (const g of this.glyphs) {
      const lat=(0.5-g.ev)*Math.PI, cosLat=Math.cos(lat);
      if (g.variation>cosLat*cosLat*1.15) continue;
      const rawU=(g.eu-CHINA_EU+0.5-this.scrollU+100)%1;
      const delta=(rawU-0.5)*Math.PI*2;
      const x3=cosLat*Math.sin(delta),y3=Math.sin(lat),z3=cosLat*Math.cos(delta);
      const y2=y3*cosT2-z3*sinT2, z2=y3*sinT2+z3*cosT2;
      if (z2<=0) continue;
      if ((g.variation*13.71)%1 > Math.abs(Math.cos(delta))*1.2) continue;
      const sx=CX+R*x3, sy=CY-R*y2;
      const base=g.isLand?(0.72+g.variation*0.28)*aL:(0.06+g.variation*0.12)*aS;
      const alpha=Math.min(1,base*(0.35+0.65*z2));
      if (alpha<=0.003) continue;
      const rr=circleR*(0.55+0.45*z2);
      const color=g.isLand?cL:cS;
      ctx.globalAlpha=alpha;
      ctx.beginPath(); ctx.arc(sx,sy,rr,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      ctx.strokeStyle=color; ctx.stroke(); ctx.fillStyle=color;
      ctx.fillText(g.char,sx,sy);
    }
    ctx.globalAlpha=1;
    // 아크
    this.arcTimer+=dt;
    if (this.arcTimer>0.7){this.arcTimer=0;if(this.arcs.length<7)this._spawnArc();}
    this.arcs=this.arcs.filter(a=>a.t<a.dur);
    for(const arc of this.arcs){
      arc.t+=dt; arc.alpha=Math.min(1,arc.t/0.3)*Math.min(1,(arc.dur-arc.t)/0.3);
      const pA=this._proj(arc.from.lat,arc.from.lon-Math.PI);
      const pB=this._proj(arc.to.lat,arc.to.lon-Math.PI);
      if(pA.z<=0||pB.z<=0) continue;
      const mx=(pA.sx+pB.sx)/2, my=(pA.sy+pB.sy)/2;
      const d=Math.hypot(pB.sx-pA.sx,pB.sy-pA.sy);
      const cx2=mx, cy2=my-d*0.45;
      const prog=arc.t/arc.dur;
      ctx.save(); ctx.globalAlpha=arc.alpha*0.7;
      ctx.strokeStyle=ac||cL; ctx.lineWidth=1.5;
      ctx.shadowColor=ac||cL; ctx.shadowBlur=8;
      ctx.beginPath();
      const steps=40;
      for(let i=0;i<=Math.round(steps*prog);i++){
        const tt=i/steps;
        const bx=(1-tt)*(1-tt)*pA.sx+2*(1-tt)*tt*cx2+tt*tt*pB.sx;
        const by=(1-tt)*(1-tt)*pA.sy+2*(1-tt)*tt*cy2+tt*tt*pB.sy;
        i===0?ctx.moveTo(bx,by):ctx.lineTo(bx,by);
      }
      ctx.stroke();
      // 도시 마커
      ctx.shadowBlur=0;
      ctx.globalAlpha=pA.z*(ac||cL?0.9:0.5); ctx.strokeStyle=ac||cL; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(pA.sx,pA.sy,3,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=pB.z*(ac||cL?0.9:0.5);
      ctx.beginPath(); ctx.arc(pB.sx,pB.sy,3,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }
}

// ── Globe 3: hex coin grid ──────────────────────────────────────────────
class Globe3 {
  constructor() { this.scrollU=0;this.cells=[];this.radius=CX;this._build(); }
  _build() {
    const r=this.radius,COLS=42,s=(r*2)/COLS; this.cellSize=s;
    const rowH=s*0.885, rows=Math.ceil((r*2)/rowH); this.cells=[];
    for (let row=0;row<=rows;row++) {
      const y=-r+row*rowH, off=row%2===0?0:s/2;
      for (let c=-1;c<=COLS;c++) {
        const x=-r+c*s+off+s/2;
        if (Math.hypot(x,y)>r-s*0.35) continue;
        this.cells.push({x,y,isLand:false,anim:1,
          seedA:Math.random(),seedB:Math.random(),seedC:Math.random(),
          timer:Math.random()*3,interval:1.2+Math.random()*3.5});
      }
    }
  }
  _land(u,v) {
    if (!earthReady) return false;
    const px=Math.min(Math.floor(((u%1+1)%1)*earthW),earthW-1);
    const py=Math.min(Math.floor(Math.max(0,Math.min(0.999,v))*earthH),earthH-1);
    return (earthData[(py*earthW+px)*4]??255)<128;
  }
  draw(dt,sp,bg,fg) {
    this.scrollU=(this.scrollU+(1/20)*sp*dt)%1;
    const s=this.cellSize,r=this.radius,mapW=r*4,mapH=r*2;
    ctx.fillStyle=bg; ctx.fillRect(0,0,SIZE,SIZE);
    if (!earthReady) return;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`700 ${Math.round(s*0.52)}px 'Inter',sans-serif`;
    for (const cell of this.cells) {
      const u=(cell.x/mapW)+0.5+this.scrollU, v=(cell.y/mapH)+0.5;
      const land=this._land(u,v);
      if (land!==cell.isLand) {
        cell.isLand=land; cell.anim=0;
        cell.seedA=Math.random();cell.seedB=Math.random();cell.seedC=Math.random();
      }
      if (!cell.isLand) {
        cell.timer+=dt;
        if (cell.timer>=cell.interval) {
          cell.timer=0;cell.interval=1.2+Math.random()*3.5;
          cell.seedB=Math.random();cell.seedC=Math.random();cell.anim=0;
        }
      }
      cell.anim=Math.min(1,cell.anim+dt*3.2);
      const px=CX+cell.x,py=CY+cell.y,pop=easeOutBack(cell.anim);
      ctx.globalAlpha=1;
      if (cell.isLand) {
        const coinR=s*0.46*(0.9+cell.seedA*0.18)*pop;
        ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(px,py,Math.max(0.5,coinR),0,Math.PI*2); ctx.fill();
        ctx.fillStyle=bg;
        if (cell.seedB<0.12) { ctx.beginPath(); ctx.arc(px,py,coinR*0.18,0,Math.PI*2); ctx.fill(); }
        else { ctx.save();ctx.translate(px,py);ctx.scale(pop,pop);ctx.fillText('£',0,s*0.02);ctx.restore(); }
      } else {
        if (cell.seedB<0.42) {
          const ringR=s*(0.16+cell.seedC*0.26)*pop;
          ctx.strokeStyle=fg; ctx.lineWidth=Math.max(1.2,s*0.075);
          ctx.beginPath(); ctx.arc(px,py,Math.max(0.5,ringR),0,Math.PI*2); ctx.stroke();
          if (cell.seedC>0.72) { ctx.fillStyle=fg;ctx.beginPath();ctx.arc(px,py,ringR*0.34,0,Math.PI*2);ctx.fill(); }
        } else if (cell.seedB<0.58) {
          ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(px,py,Math.max(0.5,s*0.09*pop),0,Math.PI*2); ctx.fill();
        }
      }
    }
    ctx.globalAlpha=1;
  }
}

// ── Globe 4: Neo / Stripe style ─────────────────────────────────────────
const NEO_CITIES=[
  [37.57,126.98],[35.68,139.69],[31.23,121.47],[39.90,116.41],[22.32,114.17],
  [1.35,103.82],[13.76,100.50],[-33.87,151.21],[28.61,77.21],[19.08,72.88],
  [25.20,55.27],[30.04,31.24],[51.51,-0.13],[48.86,2.35],[52.52,13.41],
  [55.76,37.62],[59.33,18.07],[40.71,-74.01],[34.05,-118.24],[41.88,-87.63],
  [43.65,-79.38],[19.43,-99.13],[-23.55,-46.63],[-34.60,-58.38],[6.52,3.38],
  [-26.20,28.05],[4.71,-74.07],
].map(([la,lo])=>({lat:la*Math.PI/180,lon:lo*Math.PI/180}));

const TILT4=12*Math.PI/180,cosT4=Math.cos(TILT4),sinT4=Math.sin(TILT4);

class Globe4 {
  constructor() { this.scrollU=0;this.dots=[];this.arcs=[];this.arcTimer=0;this._buildDots(); }
  _buildDots() {
    this.dots=[];
    if (!earthReady) return;
    for (let py=0;py<earthH;py+=5) for (let px=0;px<earthW;px+=5) {
      if ((earthData[(py*earthW+px)*4]??255)>=128) continue;
      this.dots.push({lat:(0.5-py/earthH)*Math.PI,lon:(px/earthW-0.5)*Math.PI*2,s:0.7+Math.random()*0.8});
    }
  }
  _proj(lat,lon) {
    const lon2=lon+this.scrollU*Math.PI*2, cL=Math.cos(lat);
    const x3=cL*Math.sin(lon2),y3=Math.sin(lat),z3=cL*Math.cos(lon2);
    const y2=y3*cosT4-z3*sinT4, z2=y3*sinT4+z3*cosT4;
    const R=SIZE*0.36; return {sx:CX+R*x3,sy:CY-R*y2,z:z2,R};
  }
  _spawn() {
    const a=Math.floor(Math.random()*NEO_CITIES.length);
    let b; do{b=Math.floor(Math.random()*NEO_CITIES.length);}while(b===a);
    this.arcs.push({from:NEO_CITIES[a],to:NEO_CITIES[b],
      head:0,tail:0,speed:0.28+Math.random()*0.18,delay:0.20+Math.random()*0.12});
  }
  _bz(t,p0,p1,p2) {
    const u=1-t;
    return {x:u*u*p0.x+2*u*t*p1.x+t*t*p2.x,y:u*u*p0.y+2*u*t*p1.y+t*t*p2.y};
  }
  _arc(p0,cp,p2,t0,t1,fa,ac) {
    const N=Math.ceil((t1-t0)*50); if(N<1)return;
    ctx.beginPath();
    for(let i=0;i<=N;i++){const t=t0+(t1-t0)*(i/N),p=this._bz(t,p0,cp,p2);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
    ctx.strokeStyle=ac+'50';ctx.lineWidth=3.5;ctx.shadowColor=ac;ctx.shadowBlur=14;ctx.globalAlpha=fa;ctx.stroke();
    ctx.strokeStyle=ac+'CC';ctx.lineWidth=1.2;ctx.shadowBlur=6;ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  draw(dt,sp,dc,ac,bg) {
    this.scrollU=(this.scrollU+0.018*sp*dt)%1;
    const R=SIZE*0.36;
    // 바깥 배경 때운 후 구면 내부를 흰색으로 체우기
    ctx.fillStyle=bg||'#ffffff'; ctx.fillRect(0,0,SIZE,SIZE);
    ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fill();
    // grid
    ctx.save();ctx.strokeStyle=dc+'18';ctx.lineWidth=0.5;
    for(let ld=-60;ld<=60;ld+=30){ctx.beginPath();let st=false;for(let i=0;i<=80;i++){const p=this._proj(ld*Math.PI/180,(i/80)*Math.PI*2-Math.PI*2);if(p.z<=0){st=false;continue;}st?ctx.lineTo(p.sx,p.sy):(ctx.moveTo(p.sx,p.sy),st=true);}ctx.stroke();}
    for(let lo=0;lo<360;lo+=30){ctx.beginPath();let st=false;for(let i=0;i<=80;i++){const p=this._proj((i/80)*Math.PI-Math.PI/2,lo*Math.PI/180-Math.PI);if(p.z<=0){st=false;continue;}st?ctx.lineTo(p.sx,p.sy):(ctx.moveTo(p.sx,p.sy),st=true);}ctx.stroke();}
    ctx.restore();
    // dots
    ctx.shadowColor=dc;
    for(const d of this.dots){const p=this._proj(d.lat,d.lon-Math.PI);if(p.z<=0.02)continue;const f=Math.min(1,p.z);ctx.globalAlpha=0.3+f*0.65;ctx.shadowBlur=f>0.7?2:0;ctx.fillStyle=dc;ctx.beginPath();ctx.arc(p.sx,p.sy,d.s*(0.5+f*0.5),0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    // city markers
    for(const city of NEO_CITIES){const p=this._proj(city.lat,city.lon-Math.PI);if(p.z<=0.05)continue;ctx.globalAlpha=p.z*0.7;ctx.strokeStyle=dc;ctx.lineWidth=0.8;ctx.shadowColor=dc;ctx.shadowBlur=5;ctx.beginPath();ctx.arc(p.sx,p.sy,4,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=p.z;ctx.fillStyle='#1a1a1a';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(p.sx,p.sy,1.5,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    // arcs
    this.arcTimer+=dt;
    if(this.arcTimer>=1.2&&this.arcs.length<8){this._spawn();this.arcTimer=0;}
    this.arcs=this.arcs.filter(a=>!(a.head>=1&&a.tail>=1));
    for(const arc of this.arcs){
      arc.head=Math.min(1,arc.head+arc.speed*dt);
      arc.tail=Math.max(0,arc.head-arc.delay);
      const pF=this._proj(arc.from.lat,arc.from.lon-Math.PI);
      const pT=this._proj(arc.to.lat,arc.to.lon-Math.PI);
      if(pF.z<=0||pT.z<=0)continue;
      const p0={x:pF.sx,y:pF.sy},p2={x:pT.sx,y:pT.sy};
      const mx=(p0.x+p2.x)/2,my=(p0.y+p2.y)/2;
      const dx=mx-CX,dy=my-CY,dist=Math.hypot(dx,dy)||1;
      const chord=Math.hypot(p2.x-p0.x,p2.y-p0.y);
      const cp={x:mx+(dx/dist)*(chord*0.35+R*0.06),y:my+(dy/dist)*(chord*0.35+R*0.06)};
      const fade=arc.head>=0.9?(1-arc.head)/0.1:1;
      this._arc(p0,cp,p2,arc.tail,arc.head,fade,ac);
      if(arc.head<0.98){const tip=this._bz(arc.head,p0,cp,p2);ctx.fillStyle='#1a1a1a';ctx.shadowColor=ac;ctx.shadowBlur=10;ctx.globalAlpha=Math.min(1,fade);ctx.beginPath();ctx.arc(tip.x,tip.y,2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;}
    }
    // shadow + rim
    const sg=ctx.createRadialGradient(CX+R*0.15,CY+R*0.15,R*0.1,CX,CY,R);
    sg.addColorStop(0,'rgba(0,0,0,0)');sg.addColorStop(0.7,'rgba(0,0,0,0)');sg.addColorStop(1,'rgba(0,0,0,0.07)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fill();
    const halo=ctx.createRadialGradient(CX,CY,R*0.95,CX,CY,R*1.15);
    halo.addColorStop(0,'rgba(0,0,0,0.05)');halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo;ctx.beginPath();ctx.arc(CX,CY,R*1.15,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.stroke();
  }
}

// ── Main loop ───────────────────────────────────────────────────────────
let g1=null,g2=null,g3=null,g4=null,active=1,lastT=0;
const DESCS={1:'화폐 글리프 · 평면 투영 · 25초/회전',2:'화폐 글리프 · 구면 투영(18° 틸트) · 12초/회전',3:'코인 그리드 · 헥스 배치 · 20초/회전',4:'도트 매트릭스 · 도시 아크 · Stripe 스타일'};

function ctrl() {
  return {
    cL:document.getElementById('color-land').value,
    cS:document.getElementById('color-sea').value,
    aL:parseInt(document.getElementById('alpha-land').value)/100,
    aS:parseInt(document.getElementById('alpha-sea').value)/100,
    bg:document.getElementById('bg-sel').value,
    // Globe 2 전용
    g2cL:document.getElementById('g2-land').value,
    g2cS:document.getElementById('g2-sea').value,
    g2aL:parseInt(document.getElementById('g2-alpha-land').value)/100,
    g2aS:parseInt(document.getElementById('g2-alpha-sea').value)/100,
    g2bg:document.getElementById('g2-bg').value,
    g2ac:document.getElementById('g2-arc').value,
    cBg:document.getElementById('coin-bg').value,
    cFg:document.getElementById('coin-fg').value,
    nd:document.getElementById('neo-dot').value,
    na:document.getElementById('neo-arc').value,
    nb:document.getElementById('neo-bg').value,
    sp:parseFloat(document.getElementById('speed').value),
  };
}

function loop(now) {
  const dt=Math.min((now-lastT)/1000,0.05); lastT=now;
  if (!earthReady){requestAnimationFrame(loop);return;}
  const c=ctrl();
  if      (active===1&&g1) g1.draw(dt,c.sp,c.cL,c.cS,c.aL,c.aS,c.bg);
  else if (active===2&&g2) g2.draw(dt,c.sp,c.g2cL,c.g2cS,c.g2aL,c.g2aS,c.g2bg,c.g2ac);
  else if (active===3&&g3) g3.draw(dt,c.sp,c.cBg,c.cFg);
  else if (active===4&&g4) g4.draw(dt,c.sp,c.nd,c.na,c.nb);
  document.getElementById('globe-wrap').style.background=active===3?c.cBg:'#ffffff';
  // 풀스크린 오버레이에 복사
  if (fsActive) {
    const W=window.innerWidth, H=window.innerHeight;
    fsCtx.fillStyle='#ffffff'; fsCtx.fillRect(0,0,W,H);
    const sz=Math.min(W,H);
    const ox=(W-sz)/2, oy=(H-sz)/2;
    if (active===1) {
      // Globe 1·3: 원형 클립 적용
      fsCtx.save();
      fsCtx.beginPath();
      fsCtx.arc(ox+sz/2, oy+sz/2, sz/2, 0, Math.PI*2);
      fsCtx.clip();
      fsCtx.drawImage(canvas, ox, oy, sz, sz);
      fsCtx.restore();
    } else {
      fsCtx.drawImage(canvas, ox, oy, sz, sz);
    }
  }
  requestAnimationFrame(loop);
}

function init() {
  g1=new Globe1();g2=new Globe2();g3=new Globe3();g4=new Globe4();
  lastT=performance.now(); requestAnimationFrame(loop);
}

loadEarth(init);

// ── UI wiring ───────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    active=parseInt(btn.dataset.g);
    document.getElementById('ctrl-g1').style.display=active===1?'block':'none';
    document.getElementById('ctrl-g2').style.display=active===2?'block':'none';
    document.getElementById('ctrl-g3').style.display=active===3?'block':'none';
    document.getElementById('ctrl-g4').style.display=active===4?'block':'none';
    // 원형 클립: Globe 1만 / 2·3·4는 정사각형
    const wrap=document.getElementById('globe-wrap');
    if(active===1){
      wrap.classList.add('circle-clip'); wrap.classList.remove('free-form');
    } else {
      wrap.classList.add('free-form'); wrap.classList.remove('circle-clip');
    }
  });
});
document.getElementById('alpha-land').addEventListener('input',e=>{document.getElementById('al-val').textContent=e.target.value+'%';});
document.getElementById('alpha-sea').addEventListener('input',e=>{document.getElementById('as-val').textContent=e.target.value+'%';});
document.getElementById('g2-alpha-land').addEventListener('input',e=>{document.getElementById('g2-al-val').textContent=e.target.value+'%';});
document.getElementById('g2-alpha-sea').addEventListener('input',e=>{document.getElementById('g2-as-val').textContent=e.target.value+'%';});
document.getElementById('speed').addEventListener('input',e=>{document.getElementById('sp-val').textContent=e.target.value+'×';});

// ── 전체보기 ───────────────────────────────────────────────
function openFs() {
  const W=window.innerWidth, H=window.innerHeight;
  fsCanvas.width=Math.round(W*DPR); fsCanvas.height=Math.round(H*DPR);
  fsCanvas.style.width=W+'px'; fsCanvas.style.height=H+'px';
  fsCtx.setTransform(DPR,0,0,DPR,0,0);
  document.getElementById('fs-overlay').classList.add('active');
  fsActive=true;
}
function closeFs() {
  document.getElementById('fs-overlay').classList.remove('active');
  fsActive=false;
}
document.getElementById('fs-btn').addEventListener('click', openFs);
document.getElementById('fs-close').addEventListener('click', closeFs);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeFs(); });
// 오버레이 배경 클릭으로 닫기
document.getElementById('fs-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('fs-overlay')) closeFs();
});
window.addEventListener('resize', ()=>{
  if(fsActive) {
    const W=window.innerWidth, H=window.innerHeight;
    fsCanvas.width=Math.round(W*DPR); fsCanvas.height=Math.round(H*DPR);
    fsCanvas.style.width=W+'px'; fsCanvas.style.height=H+'px';
    fsCtx.setTransform(DPR,0,0,DPR,0,0);
  }
});
</script>
